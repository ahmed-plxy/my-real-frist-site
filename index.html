<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="sticky-header">
    <div class="header-content">
        <div class="brand">
                <span class="title-text">نظام</span>
                <p class="brand-subtitle">موقع معمول عشان يرتب أيام طالب  ثانوية عامة</p>
            </div>
        </div>
    </div>
</header>
<div class="sticky-progress-bar">
    <div class="progress-info">
        <span>خلصت قد ايه ؟</span>
        <span id="percent-val">0%</span>
    </div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
</div>
<main class="container">
    <section class="glass-card add-task-section reveal">
        <div class="section-heading">
            <span class="eyebrow">Task Manager</span>
            <h3>ضيف مهمة جديدة</h3>
            <p>استعن بالله ولا تعجز ❤ </p>
        </div>

        <div class="form-grid">
            <div class="input-group">
                <label>الشعبة</label>
                <select id="sectionInput" onchange="updateSubjects()">
                    <option value="scientific">علمي</option>
                    <option value="literary">أدبي</option>
                </select>
            </div>

            <div class="input-group">
                <label>المادة</label>
                <select id="subjectInput"></select>
            </div>

            <div class="input-group">
                <label>الي عليك </label>
                <select id="typeInput">
                    <option value="lec">شرح</option>
                    <option value="rev">مراجعة</option>
                    <option value="sol">حل</option>
                </select>
            </div>

            <div class="input-group full-width">
                <label>التاريخ</label>
                <div class="date-pickers">
                    <select id="monthInput" onchange="updateDayOptions(); updateDatePreview();"></select>
                    <select id="dayInput" onchange="updateDatePreview();"></select>
                </div>
                <div class="day-preview">
                    <span>:</span>
                    <strong id="dayPreview">—</strong>
                </div>
            </div>

            <div class="input-group full-width">
                <label>نوع المهمة</label>
                <input type="text" id="taskInput" placeholder="مثلاً: اول محاضرة فيزياء  ...">
            </div>

            <button class="add-btn" onclick="addNewTask()">ضيف المهمة لجدولك</button>
        </div>
    </section>

    <section class="filter-wrapper reveal">
        <button class="filter-btn active" onclick="filterTasks('all')">الكل</button>
        <button class="filter-btn" onclick="filterTasks('lec')">محاضرات</button>
        <button class="filter-btn" onclick="filterTasks('rev')">مراجعات</button>
        <button class="filter-btn" onclick="filterTasks('sol')">حل</button>
    </section>

    <section class="tasks-section reveal">
        <div id="taskList" class="tasks-grid"></div>
    </section>
</main>

<div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
        <h4 id="modalTitle"></h4>
        <p id="modalMessage"></p>
        <div class="modal-actions">
            <button id="modalCancel" class="modal-btn modal-btn-secondary" type="button">إرجع</button>
