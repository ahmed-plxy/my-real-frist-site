<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام - عام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="general" class="general-mode">

<header class="sticky-header">
    <div class="header-content">
        <div class="brand">
                <span class="title-text">نظام</span>
                <p class="brand-subtitle">نسخة بسيطة لأي حد عايز يجدول يومه</p>
            </div>
        </div>
    </div>
</header>
<div class="sticky-progress-bar">
    <div class="progress-info">
        <span>خلصت قد ايه ؟</span>
        <span id="percent-val">0%</span>
    </div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
</div>
<section class="mode-switch-banner general-banner reveal" aria-label="العودة للنسخة الثانوية">
    <a class="mode-switch-link" href="index.html">
        <span class="mode-switch-title">عايز ترجع لنسخة الثانوية؟</span>
        <span class="mode-switch-subtitle">اضغط هنا</span>
    </a>
</section>

<section class="overview-panel glass-card reveal" aria-label="نظرة سريعة على المهام">
    <div class="overview-head">
        <div class="overview-copy">
            <span class="eyebrow">Quick glance</span>
            <h3>لمحة سريعة</h3>
            <p> عشان لو عايز تدور علي اسم مهمة بسرعة </p>
        </div>

        <div class="overview-stats">
            <div class="stat-card">
                <span>الكل</span>
                <strong id="totalCount">0</strong>
            </div>
            <div class="stat-card done">
                <span>منجز</span>
                <strong id="doneCount">0</strong>
            </div>
            <div class="stat-card pending">
                <span>باقي</span>
                <strong id="pendingCount">0</strong>
            </div>
        </div>
    </div>

    <div class="search-shell" role="search" aria-label="بحث داخل المهام">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <label class="sr-only" for="searchInput">بحث في المهام</label>
        <input id="searchInput" type="search" placeholder="ابحث في المهمة أو المحتوى..." autocomplete="off">
        <button id="clearSearch" class="search-clear" type="button">مسح</button>
    </div>
</section>

<main class="container">
    <section class="glass-card add-task-section reveal">
        <div class="section-heading">
            <span class="eyebrow">عام</span>
            <h3>ضيف مهمة جديدة</h3>
            <p>اكتب المهمة والتاريخ وخلاص، والباقي علينا ❤ </p>
        </div>

        <div class="form-grid">
            <div class="input-group full-width">
                <label>ورايا ايه ؟</label>
                <select id="typeInput">
                    <option value="task">مهمة</option>
                    <option value="lec">شرح</option>
                    <option value="sol">حل</option>
                    <option value="rev">مراجعة</option>
                </select>
            </div>

            <div class="input-group full-width">
                <label>المحتوي</label>
                <input type="text" id="taskInput" placeholder="اكتب اللي وراك زي ما هو...">
            </div>

            <div class="input-group full-width">
                <label>التاريخ</label>
                <div class="date-pickers">
                    <select id="monthInput" onchange="updateDayOptions(); updateDatePreview();"></select>
                    <select id="dayInput" onchange="updateDatePreview();"></select>
                </div>
                <div class="day-preview">
                    <span>:</span>
                    <strong id="dayPreview">—</strong>
                </div>
            </div>

            <button class="add-btn" onclick="addNewTask()">ضيف المهمة لجدولك</button>
        </div>
    </section>

    <section class="filter-wrapper reveal">
        <button class="filter-btn active" data-filter="all" onclick="filterTasks('all')">الكل</button>
        <button class="filter-btn" data-filter="task" onclick="filterTasks('task')">مهمة</button>
        <button class="filter-btn" data-filter="lec" onclick="filterTasks('lec')">شرح</button>
        <button class="filter-btn" data-filter="sol" onclick="filterTasks('sol')">حل</button>
        <button class="filter-btn" data-filter="rev" onclick="filterTasks('rev')">مراجعة</button>
    </section>

    <section class="tasks-section reveal">
        <div id="taskList" class="tasks-grid"></div>
    </section>
</main>

<div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<div id="modalOverlay" class="modal-overlay" hidden>
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
        <h4 id="modalTitle"></h4>
        <p id="modalMessage"></p>
        <div class="modal-actions">
            <button id="modalCancel" class="modal-btn modal-btn-secondary" type="button">إرجع</button>
            <button id="modalConfirm" class="modal-btn modal-btn-primary" type="button">اكيد؟</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
